{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 mt-10 rounded-xl shadow-md">
  <h1 class="text-2xl font-bold text-blue-600 mb-4 text-center">Tambah Kurir</h1>

  <form method="POST" class="space-y-4">
    {% csrf_token %}
    
    <div>
      <label class="block text-gray-700 font-medium mb-1">Username</label>
      <input type="text" 
             name="username" 
             class="w-full border rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-400" 
             required>
      <p class="text-xs text-gray-500 mt-1">Username akan digunakan untuk login</p>
    </div>
    
    <div>
      <label class="block text-gray-700 font-medium mb-1">Nomor WhatsApp</label>
      <input type="tel" 
             name="phone" 
             class="w-full border rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-400" 
             placeholder="Contoh: 628123456789"
             required>
      <p class="text-xs text-gray-500 mt-1">Gunakan format internasional tanpa tanda + (contoh: 628123456789)</p>
    </div>
    
    <div>
      <label class="block text-gray-700 font-medium mb-1">Password</label>
      <input type="password" 
             name="password" 
             class="w-full border rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-400" 
             required>
      <p class="text-xs text-gray-500 mt-1">Minimal 8 karakter</p>
    </div>
    
    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition font-semibold">
      + Tambah Kurir
    </button>
  </form>
  
  <div class="mt-4 text-center">
    <a href="{% url 'accounts:manage_users' %}" class="text-sm text-gray-600 hover:text-blue-600">
      ← Kembali ke Manajemen User
    </a>
  </div>
</div>

<script>
  // Validasi nomor HP sebelum submit
  document.querySelector('form').addEventListener('submit', function(e) {
    var phoneInput = document.querySelector('input[name="phone"]');
    var phone = phoneInput.value;
    
    // Hapus semua karakter non-digit
    var cleanPhone = phone.replace(/\D/g, '');
    
    if (cleanPhone.length < 10) {
      e.preventDefault();
      alert('Nomor WhatsApp minimal 10 digit!');
      return false;
    }
    
    if (!cleanPhone.startsWith('62') && !cleanPhone.startsWith('0')) {
      e.preventDefault();
      alert('Nomor WhatsApp harus dimulai dengan 62 atau 0 (contoh: 628123456789)');
      return false;
    }
    
    // Update input dengan nomor yang sudah dibersihkan
    phoneInput.value = cleanPhone;
  });
</script>
{% endblock %}
