{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <form method="post" class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm">
    {% csrf_token %}
    <input type="hidden" name="step" value="verify_otp">
    
    <h2 class="text-2xl font-semibold text-center text-blue-600 mb-4">Verifikasi WhatsApp</h2>
    
    <p class="text-gray-600 text-center mb-4">
      Kode verifikasi telah dikirim ke <br>
      <strong class="text-blue-600">{{ phone }}</strong>
    </p>

    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 p-3 rounded {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-400{% else %}bg-green-100 text-green-700 border border-green-400{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <div class="mb-4">
      <label class="block text-gray-700 text-sm font-medium mb-1 text-center">
        Masukkan Kode OTP
      </label>
      <input type="text" name="otp" required 
             placeholder="000000"
             maxlength="6"
             autocomplete="off"
             class="w-full px-4 py-2 text-center text-2xl tracking-widest border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>

    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
      Verifikasi
    </button>

    <p class="text-center text-sm mt-4 text-gray-600">
      Tidak menerima kode? 
      <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:underline">Daftar Ulang</a>
    </p>
  </form>
</div>

<script>
// Auto-focus ke field OTP dan hanya menerima angka
document.querySelector('input[name="otp"]').focus();

document.querySelector('input[name="otp"]').addEventListener('input', function(e) {
    this.value = this.value.replace(/\D/g, '').slice(0, 6);
    
    // Auto-submit jika sudah 6 digit
    if (this.value.length === 6) {
        this.form.submit();
    }
});
</script>
{% endblock %}
