{% extends 'base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center
            bg-gradient-to-br from-blue-50 to-blue-100 px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 sm:p-8">

    <!-- HEADER -->
    <div class="text-center mb-8">
      <div class="mx-auto mb-3 w-12 h-12 rounded-full
                  bg-blue-600 flex items-center justify-center shadow-md">
        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-6 w-6 text-white"
             fill="none" viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M5.121 17.804A13.937 13.937 0 0112 15
                   c2.5 0 4.847.655 6.879 1.804
                   M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-blue-700">Masuk ke Akun</h2>
      <p class="text-gray-500 text-sm mt-1">
        Silakan login untuk melanjutkan
      </p>
    </div>

    <!-- FORM -->
    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <!-- USERNAME -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">
          Username
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="h-5 w-5"
                 fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5.121 17.804A13.937 13.937 0 0112 15
                       c2.5 0 4.847.655 6.879 1.804
                       M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </span>
          <input type="text" name="username" required
                 class="w-full pl-11 pr-4 py-2.5 rounded-xl
                        border border-gray-300
                        focus:ring-2 focus:ring-blue-400
                        focus:border-blue-400 outline-none transition">
        </div>
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">
          Password
        </label>
        <div class="relative">
          <!-- ICON LOCK -->
          <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="h-5 w-5"
                 fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 11c0 .552-.447 1-1 1s-1-.448-1-1
                       .447-1 1-1 1 .448 1 1zm0 0v2
                       m6 2a2 2 0 01-2 2H8
                       a2 2 0 01-2-2v-5
                       a2 2 0 012-2h8
                       a2 2 0 012 2v5zm-2-9V7
                       a4 4 0 00-8 0v1"/>
            </svg>
          </span>

          <!-- INPUT -->
          <input id="password"
                 type="password"
                 name="password"
                 required
                 class="w-full pl-11 pr-12 py-2.5 rounded-xl
                        border border-gray-300
                        focus:ring-2 focus:ring-blue-400
                        focus:border-blue-400 outline-none transition">

          <!-- TOGGLE EYE -->
          <button type="button"
                  onclick="togglePassword()"
                  class="absolute inset-y-0 right-3
                         flex items-center text-gray-400
                         hover:text-blue-600 transition">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg"
                 class="h-5 w-5"
                 fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0
                       3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943
                       7.523 5 12 5
                       c4.478 0 8.268 2.943
                       9.542 7
                       -1.274 4.057
                       -5.064 7
                       -9.542 7
                       -4.477 0
                       -8.268-2.943
                       -9.542-7z"/>
            </svg>
          </button>
        </div>

        <!-- FORGOT PASSWORD -->
        <div class="text-right mt-2">
          <a href="{% url 'accounts:password_reset_otp' %}"
             class="text-sm text-blue-600 hover:text-blue-700
                    hover:underline transition">
            Lupa password?
          </a>
        </div>
      </div>

      <!-- BUTTON -->
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2.5 rounded-xl
                     font-semibold hover:bg-blue-700
                     shadow-md hover:shadow-lg transition">
        Login
      </button>
    </form>

    <!-- REGISTER -->
    <div class="text-center mt-6 text-sm">
      <p class="text-gray-600">Belum punya akun?</p>
      <a href="{% url 'accounts:register' %}"
             class="text-sm text-blue-600 hover:text-blue-700
                    hover:underline transition">
            Daftar Akun
          </a>
    </div>

  </div>
</div>

<!-- TOGGLE PASSWORD SCRIPT -->
<script>
function togglePassword() {
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');

  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13.875 18.825A10.05 10.05 0 0112 19
               c-4.478 0-8.268-2.943-9.542-7
               a9.956 9.956 0 012.492-4.362M6.223 6.223
               A9.956 9.956 0 0112 5
               c4.478 0 8.268 2.943 9.542 7
               a9.978 9.978 0 01-4.21 5.568
               M15 12a3 3 0 00-3-3"/>
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 3l18 18"/>`;
  } else {
    passwordInput.type = 'password';
    eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M2.458 12C3.732 7.943 7.523 5 12 5
               c4.478 0 8.268 2.943 9.542 7
               -1.274 4.057 -5.064 7 -9.542 7
               -4.477 0 -8.268-2.943 -9.542-7z"/>`;
  }
}
</script>

{% endblock %}
